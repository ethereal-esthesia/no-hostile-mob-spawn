name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test.
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  release-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build release artifact
        run: ./script/build-release.sh

      - name: Report release artifact
        run: |
          version="$(./script/project-version.sh)"
          artifact="$(./script/artifact-name.sh path)"
          test -f "$artifact"
          echo "Dry run passed."
          echo "Would create tag: v${version}"
          echo "Would publish artifact: $artifact"
