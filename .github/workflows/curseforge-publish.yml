name: Publish Current Version to CurseForge

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: Type "publish" to publish the current modVersion to CurseForge.
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && inputs.confirm_publish == 'publish'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate CurseForge configuration
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
        run: |
          test -n "$CURSEFORGE_API_TOKEN" || { echo "Missing CURSEFORGE_API_TOKEN secret." >&2; exit 1; }
          test -n "$CURSEFORGE_PROJECT_ID" || { echo "Missing CURSEFORGE_PROJECT_ID repository variable." >&2; exit 1; }

      - name: Read release version
        id: version
        run: |
          version="$(./script/project-version.sh)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Refuse duplicate CurseForge upload
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p build
          marker="curseforge-upload-v${VERSION}.json"
          if ! gh release view "$TAG" --json assets --jq '.assets[].name' > build/release-assets.txt; then
            echo "GitHub release $TAG does not exist yet; create the GitHub release before publishing to CurseForge." >&2
            exit 1
          fi

          if grep -Fx "$marker" build/release-assets.txt >/dev/null; then
            echo "CurseForge upload marker $marker already exists on $TAG." >&2
            echo "Refusing to upload another file for the same version." >&2
            exit 1
          else
            echo "GitHub release $TAG exists and has no CurseForge upload marker; continuing."
          fi

      - name: Build release artifact
        run: ./script/build-release.sh

      - name: Publish to CurseForge
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
        run: ./script/publish-curseforge.sh

      - name: Record CurseForge upload
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          marker="build/curseforge-upload-v${VERSION}.json"
          cp build/curseforge-upload-response.json "$marker"
          gh release upload "$TAG" \
            "$marker" \
            --clobber
