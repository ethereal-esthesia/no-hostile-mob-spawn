name: Release

on:
  workflow_dispatch:
    inputs:
      confirm_release:
        description: Type "release" to publish the current modVersion.
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && inputs.confirm_release == 'release'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Read release version
        id: version
        run: |
          version="$(./script/project-version.sh)"
          hytale_version="$(./script/hytale-version.sh)"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "hytale_version=${hytale_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Refuse duplicate tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists." >&2
            exit 1
          fi

      - name: Build release artifact
        run: ./script/build-release.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          HYTALE_VERSION: ${{ steps.version.outputs.hytale_version }}
        run: |
          gh release create "$TAG" \
            build/libs/NoHostileMobSpawn-"$VERSION"-hytale-"$HYTALE_VERSION".jar \
            --target "$GITHUB_SHA" \
            --title "NoHostileMobSpawn $VERSION for Hytale $HYTALE_VERSION" \
            --notes "Release $VERSION for Hytale $HYTALE_VERSION. Smoke tests passed before publishing."
