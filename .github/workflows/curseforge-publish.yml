name: Publish Release to CurseForge

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: Type "publish" to publish the requested modVersion to CurseForge.
        required: true
        type: string
      mod_version:
        description: Mod release version to publish, for example 1.0.8.
        required: true
        type: string
      hytale_version:
        description: Optional Hytale version that the release must match, for example 0.5.6.
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && inputs.confirm_publish == 'publish'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Validate CurseForge configuration
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
        run: |
          test -n "$CURSEFORGE_API_TOKEN" || { echo "Missing CURSEFORGE_API_TOKEN secret." >&2; exit 1; }
          test -n "$CURSEFORGE_PROJECT_ID" || { echo "Missing CURSEFORGE_PROJECT_ID repository variable." >&2; exit 1; }

      - name: Check out requested release tag
        id: version
        env:
          REQUESTED_MOD_VERSION: ${{ inputs.mod_version }}
          REQUESTED_HYTALE_VERSION: ${{ inputs.hytale_version }}
        run: |
          requested="${REQUESTED_MOD_VERSION#v}"
          case "$requested" in
            ""|*[!0-9.]*|.*|*..*|*.)
              echo "Invalid mod version: $REQUESTED_MOD_VERSION" >&2
              exit 1
              ;;
          esac

          tag="v${requested}"
          git fetch origin "refs/tags/${tag}:refs/tags/${tag}"
          git checkout --detach "$tag"

          version="$(./script/project-version.sh)"
          hytale_version="$(./script/hytale-version.sh)"
          if [ "$version" != "$requested" ]; then
            echo "Requested mod version $requested, but $tag contains modVersion=$version." >&2
            exit 1
          fi

          if [ -n "$REQUESTED_HYTALE_VERSION" ] && [ "$hytale_version" != "$REQUESTED_HYTALE_VERSION" ]; then
            echo "Requested Hytale $REQUESTED_HYTALE_VERSION, but $tag is pinned to Hytale $hytale_version." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "hytale_version=${hytale_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Refuse duplicate CurseForge upload
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p build
          marker="curseforge-upload-v${VERSION}.json"
          if ! gh release view "$TAG" --json assets --jq '.assets[].name' > build/release-assets.txt; then
            echo "GitHub release $TAG does not exist yet; create the GitHub release before publishing to CurseForge." >&2
            exit 1
          fi

          if grep -Fx "$marker" build/release-assets.txt >/dev/null; then
            echo "CurseForge upload marker $marker already exists on $TAG." >&2
            echo "Refusing to upload another file for the same version." >&2
            exit 1
          else
            echo "GitHub release $TAG exists and has no CurseForge upload marker; continuing."
          fi

      - name: Build release artifact
        run: ./script/build-release.sh

      - name: Publish to CurseForge
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
        run: ./script/publish-curseforge.sh

      - name: Record CurseForge upload
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          marker="build/curseforge-upload-v${VERSION}.json"
          cp build/curseforge-upload-response.json "$marker"
          gh release upload "$TAG" \
            "$marker" \
            --clobber
