name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test.
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  release-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Prepare Hytale runtime
        env:
          HYTALE_RUNTIME_ARCHIVE_URL: ${{ secrets.HYTALE_RUNTIME_ARCHIVE_URL }}
          HYTALE_RUNTIME_ARCHIVE_AUTH_HEADER: ${{ secrets.HYTALE_RUNTIME_ARCHIVE_AUTH_HEADER }}
          HYTALE_RUNTIME_ARCHIVE_SHA256: ${{ secrets.HYTALE_RUNTIME_ARCHIVE_SHA256 }}
        run: ./script/ci-prepare-hytale-runtime.sh

      - name: Run all tests
        run: ./script/test-all.sh

      - name: Report release artifact
        run: |
          version="$(./script/project-version.sh)"
          hytale_version="$(./script/hytale-version.sh)"
          artifact="build/libs/NoHostileMobSpawn-${version}-hytale-${hytale_version}.jar"
          test -f "$artifact"
          echo "Dry run passed."
          echo "Would create tag: v${version}"
          echo "Would publish artifact: $artifact"
